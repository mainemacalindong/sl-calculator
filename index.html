<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SL & Lot Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 10px;
    }

    .container {
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      width: 240px; /* smaller width */
    }

    h2 {
      font-size: 13px;
      margin: 0 0 8px;
    }

    label {
      font-size: 11px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 5px;
      margin: 2px 0 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 11px;
    }

    .result {
      margin-top: 4px;
      padding: 5px;
      background: #e8f0fe;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }

    .row {
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>SL & Lot</h2>

  <label>Account</label>
  <input type="number" id="accountValue">

  <label>Current</label>
  <input type="number" id="currentRange">

  <label>7D</label>
  <input type="number" id="range7d">

  <label>30D</label>
  <input type="number" id="range30d">

  <div class="result row">
    <span>SL</span>
    <span id="sl">0</span>
  </div>

  <div class="result row">
    <span>Div</span>
    <span id="divisor">0</span>
  </div>

  <div class="result row">
    <span>Lot</span>
    <span id="lot">0</span>
  </div>
</div>

<script>
  const inputs = document.querySelectorAll("input");

  inputs.forEach(input => {
    input.addEventListener("input", calculate);
  });

  function calculate() {
    const accountValue = parseFloat(document.getElementById("accountValue").value) || 0;
    const range7d = parseFloat(document.getElementById("range7d").value) || 0;
    const range30d = parseFloat(document.getElementById("range30d").value) || 0;

    // === SL ===
    let sl = (range7d + range30d) / 2;

    // ROUND UP to nearest 1000
    sl = Math.ceil(sl / 1000) * 1000;

    if (sl < 2000) sl = 2000;

    // === DIVISOR ===
    const baseSL = 2000;
    const baseDivisor = 5000;

    const dynamicDivisor = baseDivisor * (sl / baseSL);

    // === LOT ===
    let lot = 0;
    if (dynamicDivisor > 0) {
      lot = accountValue / dynamicDivisor;
    }

    // OUTPUT
    document.getElementById("sl").textContent = sl.toLocaleString();
    document.getElementById("divisor").textContent = dynamicDivisor.toLocaleString();
    document.getElementById("lot").textContent = lot.toFixed(2);
  }
</script>

</body>
</html>
