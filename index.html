<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SL & Lot Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* TOP ALIGN */
    }

    .container {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      width: 280px;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 10px;
      text-align: center;
    }

    label {
      font-size: 12px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 6px;
      margin: 4px 0 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 12px;
    }

    .result {
      margin-top: 6px;
      padding: 6px;
      background: #e8f0fe;
      border-radius: 4px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>SL & Lot Calculator</h2>

  <label>Account Value</label>
  <input type="number" id="accountValue">

  <label>Current Range</label>
  <input type="number" id="currentRange">

  <label>7 Day Range</label>
  <input type="number" id="range7d">

  <label>30 Day Range</label>
  <input type="number" id="range30d">

  <div class="result">
    SL: <span id="sl">0</span>
  </div>

  <div class="result">
    Divisor: <span id="divisor">0</span>
  </div>

  <div class="result">
    Lot: <span id="lot">0</span>
  </div>
</div>

<script>
  const inputs = document.querySelectorAll("input");

  inputs.forEach(input => {
    input.addEventListener("input", calculate);
  });

  function calculate() {
    const accountValue = parseFloat(document.getElementById("accountValue").value) || 0;
    const range7d = parseFloat(document.getElementById("range7d").value) || 0;
    const range30d = parseFloat(document.getElementById("range30d").value) || 0;

    // === STEP 1: Dynamic SL ===
    let sl = (range7d + range30d) / 2;

    // ROUND UP to nearest 1000
    sl = Math.ceil(sl / 1000) * 1000;

    // Minimum SL
    if (sl < 2000) sl = 2000;

    // === STEP 2: Dynamic Divisor ===
    const baseSL = 2000;
    const baseDivisor = 5000;

    const dynamicDivisor = baseDivisor * (sl / baseSL);

    // === STEP 3: Lot ===
    let lot = 0;
    if (dynamicDivisor > 0) {
      lot = accountValue / dynamicDivisor;
    }

    // OUTPUT
    document.getElementById("sl").textContent = sl.toLocaleString();
    document.getElementById("divisor").textContent = dynamicDivisor.toLocaleString();
    document.getElementById("lot").textContent = lot.toFixed(2);
  }
</script>

</body>
</html>
